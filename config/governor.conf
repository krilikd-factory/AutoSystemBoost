# smart_battery_bias: extra battery-lean nudge for Smart (x1000, 0=off).
# Raise toward economy (range 0-600); scaled by confidence, and the final lean
# is still hard-capped at pure-battery, so it shifts the lean without ever going
# past battery behaviour. Night/idle overrides still take precedence.
# Examples: 150 = mild, 300 = moderate, 500-600 = strong (can push active use
# into the deeper "behave like battery" economies on a confident learner).
