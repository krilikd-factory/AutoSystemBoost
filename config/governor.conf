# Disable system blur / heavy visual effects: 0|1
#   0 = stock (all blur and material effects on, as OxygenOS ships them).
#   1 = turn OFF background/panel/volume blur, launcher blur, gaussian blur and
#       material blur, and drop the OPPO animation level to 0. Saves GPU/CPU and
#       helps battery + smoothness at the cost of visual polish. Applied via
#       read-only props at boot, so it takes effect after a reboot.
disable_blur=0
# Audio processing profile: eq_compat|stock|hifi
#   Which side does the SOFTWARE processing. These are one axis, not three toggles:
#     eq_compat = UHQA off, af.resampler.quality=0. Hands the signal to an external
#                 EQ/ViPER untouched - forcing max resampling underneath one is exactly
#                 what breaks it. This is the safe default.
#     stock     = baseline only (hi-fi int_codec on, aec_ref off). No opinion either way.
#     hifi      = stock + UHQA on, hi-fi props, af.resampler.quality=255. Best when you
#                 are NOT running an external EQ. Pointless (and counter-productive)
#                 together with one.
#   Replaces the old AUDIO_EQ_COMPAT + property half of AUDIO_AGGRESSIVE, which were
#   direct opposites presented as two independent switches: with EQ compat on (the
#   default) the aggressive properties were silently dead code.
#   Applies without a reboot via WebUI "apply now" (restarts audioserver).
audio_profile=stock

# Hi-Fi DAC mixer tuning: 0|1
#   Headphone companders OFF and RX HPH Mode -> CLS_H_HIFI in the device's own mixer
#   files. This is CODEC configuration, not software processing, so it is a separate
#   axis from audio_profile and is safe to combine with eq_compat (it does not fight an
#   external EQ - it just gives it a cleaner DAC to work with).
#   Was the mixer half of AUDIO_AGGRESSIVE. Needs a reboot (overlay).
audio_dac_hifi=0
CAMERA_LEVEL=0
CAMERA_AGGRESSIVE=0
CAMERA_AGGRESSIVE_INJECT=safe
