night_quiet_auto_min_samples=3
charge_aware_enable=1
cool_gaming=1

# Media loudness: stock|mild|strong|max
#   Reshapes the audio-policy volume CURVES so every slider position is genuinely
#   louder. Stock OxygenOS attenuates hard across the usable range (media is -40 dB
#   at 20%, -17 dB at 60%), which is why the phone feels short of volume.
#     stock  = untouched.
#     mild   = ~+3.4 dB at 60%, ~+4 dB at 20%.
#     strong = ~+6 dB at 60%, ~+7 dB at 20%.
#     max    = ~+10 dB at 60%, ~+12 dB at 20%. This is as far as the curve can go and
#              still be provably safe: every point stays NEGATIVE (attenuation), so the
#              signal is only ever turned down from source level - clipping is not
#              arithmetically possible. The cost is range, not distortion: from 60% to
#              100% you now only have ~7 dB of travel, so the top of the slider gets
#              coarse. If it is still not loud enough at 100%, the curve is out of road
#              (0 dB = unity = the source itself) and you need dsp_loudness.
#   The boost is position-weighted: it ramps in over the first 40% of slider travel,
#   so the bottom of the range keeps stock levels (1% stays ~-58 dB) and quiet
#   listening still works, while the full lift lands where people actually listen.
#   Only the MUSIC curves are touched (speaker + headset/BT/earpiece). Alarms,
#   ringtones and notifications keep stock loudness. The 0 dB point at 100% is never
#   raised, so nothing clips - for real gain ABOVE unity use dsp_loudness below.
#   Needs a reboot.
media_loudness=stock

# ASB DSP loudness: off|3|6|9   (dB of makeup gain, limiter always on)
#   This is the gain stage the volume curves cannot provide: media_loudness can make
#   every slider position louder but can never exceed 0 dB at 100% (that is unity --
#   past it you only clip). dsp_loudness adds real gain ABOVE unity, with a
#   peak limiter (instant attack, ~120 ms release, -1 dBFS ceiling) so it cannot clip.
#   It is applied by libasbdsp.so, attached automatically to every music stream via
#   <postprocess> -- no companion app, so no "quiet until you open the EQ" problem.
#   off = library not installed at all (zero overhead, zero risk).
#   Start at 3, go up only if you want more; 9 dB on already-loud masters will make
#   the limiter work hard and can sound squashed. Needs a reboot.
dsp_loudness=off


# Bluetooth absolute volume: stock|disabled
#   stock    = absolute volume ON (default, recommended). The headset performs
#              the final attenuation and stays in sync with the phone slider:
#              loud, synced, no quiet-start.
#   disabled = absolute volume OFF. The phone applies its own software gain and
#              the headset keeps its own level. For car stereos / speakers that
#              are already too loud at step 1, or DSP setups that want the gain
#              stage on the phone. On modern headsets this often starts QUIET
#              after a reboot until an audio app re-inits the output.
# Legacy values are migrated automatically: auto/off -> stock, on -> disabled.
bt_absvol_mode=stock

# Bluetooth A2DP hardware offload: on|off|auto
#   on   = keep A2DP offloaded to the DSP (stock, best battery/codec efficiency).
#          BUT audio effect engines (ViPER4Android, JamesDSP, etc.) CANNOT process
#          Bluetooth audio while it is offloaded — the stream bypasses the effect
#          chain in the DSP. With such an effect installed this can make BT start
#          quiet after every connect until the effect app is opened (which forces
#          a non-offload re-open).
#   off  = disable A2DP offload -> Bluetooth audio goes through the software path,
#          so effect engines process it from the first connect and volume is
#          correct immediately (no need to open the effect app). Costs some CPU/
#          battery on BT playback. Use this if you run ViPER4Android on Bluetooth.
#   auto = do not touch the offload props (leave the ROM / other modules' choice).
bt_a2dp_offload=on

# Region: allow system locale as a last-resort source for Wi-Fi country code
# when no SIM/operator country is available. 0=off (safest), 1=allow locale.
region_allow_locale=0
charge_assist_alpha_max=450
charge_temp_warn_dC=390
charge_temp_hot_dC=415
# GPU idle-trim: in light non-video states (LIGHT_IDLE/MODERATE, not gaming,
# not thermal-capped) shave the GPU ceiling by this % to save the GPU rail,
# never dropping below the floor. Tuned up from 8 to 12 after full-day logs
# showed GPU busy at 0% for ~77% of screen-on time on OP15 — plenty of slack.
# Only bites profiles whose GPU ceiling sits above floor+trim (balanced/smart);
# battery already runs a low GPU cap so the floor guard leaves it untouched.
gpu_idle_trim_pct=12
gpu_idle_trim_floor=55
gpu_video_busy_min=40

# --- Device-adaptive bounds (Phase 2) ---
# 0 = governor uses its compiled-in OP15 bounds (default, what ships).
# 1 = governor loads per-device bounds from /data/adb/asb/device_bounds.env,
#     synthesised at install/boot by scaling the OP15 reference ratios onto this
#     device's real frequencies. On OP15 the synthesised values equal the
#     compiled ones, so enabling this changes nothing on the reference device.
#     Malformed/missing file or an inverted invariant -> silent fallback to
#     compiled defaults. Opt-in while the derivation is validated on more devices.
device_bounds_override=1
