# --- Skin-anchored thermal decision (V59.1) ------------------------------------
# The cpu_max (junction) sensor sits at 85-95C under ANY real load, so throttling/
# vetoing on it alone false-fires during normal bursts and defeats race-to-idle
# (worse heat AND drain). When a shell/skin sensor is present ASB instead decides
# on user-facing heat, falling back to the junction gate (thermal_throttle_temp /
# veto=65) when no skin sensor exists.
#   thermal_skin_gate=1        1=use skin when present, 0=old junction-only behaviour
#   thermal_skin_c=47          skin temp (C) that engages the comfort throttle/veto
#   thermal_junction_hard_c=95 junction hard-limit (C) that always throttles (silicon guard)
thermal_skin_gate=1
thermal_skin_c=47
thermal_junction_hard_c=95
# --- Gaming CPU ceiling ---------------------------------------------------------
# During the GAMING state the smart curve can request up to ~3 GHz, but the vendor
# PowerHAL clamps the real clock to ~2.2 GHz anyway — the extra request buys no FPS
# and only causes brief high-voltage OPP excursions (more heat + drain). This caps
# the DECLARED scaling_max in gaming so ASB never asks higher than the vendor holds.
# 0 = disabled. Default 2400000 (2.4 GHz) sits just above the vendor's gaming settle.
gaming_cpu_max_ceiling_khz=2400000
gaming_gap_thresh=1650000
gaming_gap_ticks=5
