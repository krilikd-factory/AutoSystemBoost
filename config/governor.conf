# ASB V22 adaptive governor configuration
# key=value

# Enter thresholds
heavy_gpu_enter=35
heavy_load_enter=2.0
gaming_gpu_enter=65
sustained_gpu_min=45
sustained_load_min=4.0
sustained_temp_enter=65  # должен совпадать с thermal_throttle_temp
sustained_temp_exit=55   # гистерезис выхода (< sustained_temp_enter, предотвращает cycling)

# Leave thresholds / hysteresis
heavy_gpu_exit=25
gaming_gpu_exit=55
sustained_gpu_exit=35
sustained_level=0.80        # 0.0-1.0, уровень caps в SUSTAINED (0.80 = 80% от ceiling профиля)

# Minimum dwell time in seconds before leaving state
heavy_min_dwell_s=8
sustained_min_dwell_s=24
gaming_min_dwell_s=12

# Reassert timers
reassert_heavy_s=12
reassert_gaming_s=6

# msm_performance boost-only mode
msm_perf_boost_only=1

# Thermal overlay reduction for non-sustained states
thermal_overlay_pct=20
thermal_throttle_temp = 65  # порог throttle detection
# Gap-aware SUSTAINED (V22-r5)
# Если в GAMING реальный cap_gap > gaming_gap_thresh кHz за gaming_gap_ticks тиков подряд,
# governor переходит в SUSTAINED без ожидания теплового порога.
gaming_gap_thresh=1500000     # kHz (1.5 GHz разрыв)
gaming_gap_ticks=4            # тиков подряд (~8 секунд при 2с/тик)
gaming_retry_cooldown_s=30    # сек cooldown перед повторной попыткой GAMING
