# AutoSystemBoost — single source of truth for FSM profile bounds.
#
# This file is the ONLY place where per-profile CPU/GPU bounds and FSM-shape
# parameters are defined. All other consumers read derived files:
#
#   profiles/{battery,balanced,performance}.sh  sources  config/profile_bounds.generated.sh
#   src/asb_fsm.h                                #include  src/asb_fsm_bounds.generated.h
#
# To change a value:
#   1. Edit the variable below
#   2. Run tools/gen_bounds.sh
#   3. Run tools/asb_lint.sh — fails if generated files are stale
#   4. Commit profile_bounds.conf + the two generated files together
#
# Format: KEY=VALUE per line, shell-readable. Comments start with #.
# All CPU frequencies are in kHz. GPU percentages are 0-100.
#
# Naming convention:
#   <PROFILE>_<KIND>_<SCOPE>
#
#   PROFILE = BATTERY | BALANCED | PERFORMANCE
#   KIND    = CPU_MIN | CPU_CAP | CPU_MAX | GPU_MAX_PCT
#             (base values — appear in both .sh and C header)
#           = FLOOR_GPU_MAX_PCT | FLOOR_GPU_MIN_PCT | CEIL_GPU_MIN_PCT
#           | FLOOR_RAVG_TICKS | CEIL_RAVG_TICKS
#           | FLOOR_IDLE_ENOUGH | CEIL_IDLE_ENOUGH
#           | FLOOR_UCLAMP_TOP | FLOOR_UCLAMP_BG | CEIL_UCLAMP_TOP | CEIL_UCLAMP_BG
#             (C-only values — appear only in generated header)
#   SCOPE   = LITTLE | BIG  (only for CPU_*; GPU/UCLAMP/etc are cluster-agnostic)
#
# Derived bounds rule (applied by gen_bounds.sh, NOT stored here):
#   g_profile_bounds[P].floor.cpu_max[0] = <P>_CPU_CAP_LITTLE
#   g_profile_bounds[P].floor.cpu_max[1] = <P>_CPU_CAP_BIG
#   g_profile_bounds[P].floor.cpu_min[0] = <P>_CPU_MIN_LITTLE
#   g_profile_bounds[P].floor.cpu_min[1] = <P>_CPU_MIN_BIG
#   g_profile_bounds[P].ceil.cpu_max[0]  = <P>_CPU_MAX_LITTLE
#   g_profile_bounds[P].ceil.cpu_max[1]  = <P>_CPU_MAX_BIG
#   g_profile_bounds[P].ceil.cpu_min[0]  = <P>_CPU_CAP_LITTLE
#   g_profile_bounds[P].ceil.cpu_min[1]  = <P>_CPU_CAP_BIG
#   g_profile_bounds[P].ceil.gpu_max_pct = <P>_GPU_MAX_PCT
#
# Invariants (checked by tools/gen_bounds.sh):
#   CPU_MIN <= CPU_CAP <= CPU_MAX  (per cluster, per profile)
#   GPU_MAX_PCT in [1, 100]
#   FLOOR_GPU_MAX_PCT <= GPU_MAX_PCT
#   FLOOR_RAVG_TICKS >= 1, CEIL_RAVG_TICKS >= 1
#   FLOOR_IDLE_ENOUGH in [0, 100], CEIL_IDLE_ENOUGH in [0, 100]
#   FLOOR_UCLAMP_TOP in [0, 100], CEIL_UCLAMP_TOP in [0, 100]
#   FLOOR_UCLAMP_BG  in [0, 100], CEIL_UCLAMP_BG  in [0, 100]
#   FLOOR_UCLAMP_TOP <= CEIL_UCLAMP_TOP  (uclamp grows with load)
#   Across profiles: BATTERY_CPU_CAP <= BALANCED_CPU_CAP <= PERFORMANCE_CPU_CAP (per cluster)


# =====================================================================
# BATTERY profile
# =====================================================================
# Conservative ceiling — favours battery life over peak performance.
# CPU_MAX intentionally below silicon ceiling so SUSTAINED + LIGHT_IDLE
# stay cool. GPU floor raised to 45 (V40 fix) — vendor PowerHAL on
# SM8850 clamps GPU max_pwrlevel to 17 (160MHz) when it sees low FSM
# cpu_max + LIGHT_IDLE. Raising floor breaks that vendor heuristic.

BATTERY_CPU_MIN_LITTLE=307200
BATTERY_CPU_MIN_BIG=614400
BATTERY_CPU_CAP_LITTLE=921600
BATTERY_CPU_CAP_BIG=921600
BATTERY_CPU_MAX_LITTLE=1804800
BATTERY_CPU_MAX_BIG=2208000
BATTERY_GPU_MAX_PCT=50

BATTERY_FLOOR_GPU_MAX_PCT=45
BATTERY_FLOOR_GPU_MIN_PCT=0
BATTERY_CEIL_GPU_MIN_PCT=0
BATTERY_FLOOR_RAVG_TICKS=8
BATTERY_CEIL_RAVG_TICKS=8
BATTERY_FLOOR_IDLE_ENOUGH=95
BATTERY_CEIL_IDLE_ENOUGH=95
BATTERY_FLOOR_UCLAMP_TOP=35
BATTERY_FLOOR_UCLAMP_BG=25
BATTERY_CEIL_UCLAMP_TOP=50
BATTERY_CEIL_UCLAMP_BG=40


# =====================================================================
# BALANCED profile
# =====================================================================
# Daily-driver setpoint. Floor = CPU_CAP, ceil = CPU_MAX. UI bursts get
# uclamp_top=85 for snappy interaction; bg stays at 35.

BALANCED_CPU_MIN_LITTLE=787200
BALANCED_CPU_MIN_BIG=883200
BALANCED_CPU_CAP_LITTLE=1190400
BALANCED_CPU_CAP_BIG=1881600
BALANCED_CPU_MAX_LITTLE=3302400
BALANCED_CPU_MAX_BIG=3974400
BALANCED_GPU_MAX_PCT=85

BALANCED_FLOOR_GPU_MAX_PCT=42
BALANCED_FLOOR_GPU_MIN_PCT=0
BALANCED_CEIL_GPU_MIN_PCT=0
BALANCED_FLOOR_RAVG_TICKS=4
BALANCED_CEIL_RAVG_TICKS=3
BALANCED_FLOOR_IDLE_ENOUGH=50
BALANCED_CEIL_IDLE_ENOUGH=45
BALANCED_FLOOR_UCLAMP_TOP=50
BALANCED_FLOOR_UCLAMP_BG=25
BALANCED_CEIL_UCLAMP_TOP=85
BALANCED_CEIL_UCLAMP_BG=35


# =====================================================================
# PERFORMANCE profile
# =====================================================================
# Sustained-optimized for COD Mobile and similar.
# CPU_MAX deliberately below silicon ceiling (4.6 GHz P-cluster) to stay
# under vendor's reactive thermal-service.qti trigger at ~60°C. GPU min
# kept non-zero — performance state needs guaranteed GPU floor for frame
# pacing. V41 vendor overlay (QAPE 44°C trigger) complements these caps.

PERFORMANCE_CPU_MIN_LITTLE=1190400
PERFORMANCE_CPU_MIN_BIG=921600
PERFORMANCE_CPU_CAP_LITTLE=2150400
PERFORMANCE_CPU_CAP_BIG=2438400
PERFORMANCE_CPU_MAX_LITTLE=2956800
PERFORMANCE_CPU_MAX_BIG=3302400
PERFORMANCE_GPU_MAX_PCT=60

PERFORMANCE_FLOOR_GPU_MAX_PCT=35
PERFORMANCE_FLOOR_GPU_MIN_PCT=8
PERFORMANCE_CEIL_GPU_MIN_PCT=20
PERFORMANCE_FLOOR_RAVG_TICKS=2
PERFORMANCE_CEIL_RAVG_TICKS=2
PERFORMANCE_FLOOR_IDLE_ENOUGH=10
PERFORMANCE_CEIL_IDLE_ENOUGH=8
PERFORMANCE_FLOOR_UCLAMP_TOP=68
PERFORMANCE_FLOOR_UCLAMP_BG=35
PERFORMANCE_CEIL_UCLAMP_TOP=84
PERFORMANCE_CEIL_UCLAMP_BG=62
