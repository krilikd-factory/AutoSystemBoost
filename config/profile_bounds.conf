# =============================================================================
# profile_bounds.conf — Smart FSM synthesis rails (NOT manual-profile caps)
# =============================================================================
# IMPORTANT — what these values are, and what they are NOT:
#
#   These <PROFILE>_CPU_{MIN,CAP,MAX}_* and <PROFILE>_*_GPU_* keys are the
#   per-state BOUNDS the Smart governor interpolates between when it synthesises
#   a live cap (asb_fsm.h consumes them via asb_fsm_bounds.generated.h). They
#   are the "rails" for Smart, named per shipped profile only because Smart
#   blends the BATTERY rail and the BALANCED rail by its learned alpha:
#       MIN  -> the DEEP_IDLE floor      (t=0.0)
#       CAP  -> the light-state ceiling  (DEEP_IDLE/LIGHT_IDLE cap)
#       MAX  -> the GAMING/peak ceiling  (t=1.0)
#
#   They are NOT the caps applied for a MANUAL battery/balanced/performance
#   profile. Manual profiles are capped by per-device PERCENTAGES of each
#   cluster's own cpuinfo_max_freq in service.sh (apply_screen_aware_caps,
#   _P_CPUCAP_L/_P_CPUCAP_B) — a completely separate mechanism. The old
#   absolute-frequency manual path (asb_check_perfhal_drift) is disabled/unused.
#
#   Ownership contract (also surfaced in `asb diag`):
#       manual profile  -> service.sh per-device % caps
#       smart profile   -> governor/FSM using THESE bounds
#       thermal override -> writer/governor, on top of either
#
#   So: edit these to retune SMART (and any battery-lean Smart, since at high
#   alpha the BATTERY rail is what Smart rides). To retune a MANUAL profile,
#   edit the percentages in service.sh instead. This file is the source of
#   truth; run tools/gen_bounds.sh after editing to regenerate the .generated.sh
#   and the C header, then asb_lint checks shell<->C parity.
# =============================================================================
