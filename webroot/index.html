<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>AutoSystemBoost</title>
<meta name="theme-color" content="#010204">
<meta name="color-scheme" content="dark">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<style>
/* V38 RC: KSU WebUI insets.css is required — it triggers MMRL/KSU native runtime
 * to paint the Android status-bar area with theme-color. Removing it causes a
 * grey bar at the top. The file is tiny (~200 bytes) and cached after first use,
 * so any "slow open" perception was unfounded. */
@import "https://mui.kernelsu.org/internal/insets.css";
/* Inline fallback: if @import fails to load (offline, etc), the CSS vars below
 * still resolve via env() so layout doesn't break. */
:root { --window-inset-top: env(safe-area-inset-top, 0px); --window-inset-bottom: env(safe-area-inset-bottom, 0px); }

*, *::before, *::after {
  margin: 0; padding: 0;
  box-sizing: border-box;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --top: var(--window-inset-top, 0px);
  --bot: var(--window-inset-bottom, 0px);
  --bg: #010204;
  --card: rgba(6,24,18,.55);
  --border: rgba(0,240,180,.06);
  --border-h: rgba(0,240,180,.25);
  --accent: #00f0b4;
  --accent2: #00d4ff;
  --text: #e8f4ef;
  --sub: rgba(232,244,239,.45);
  --dim: rgba(232,244,239,.2);
  --perf: #ff3b3b;
  --perf-g: rgba(255,59,59,.12);
  --bal: #ffb740;
  --bal-g: rgba(255,183,64,.12);
  --bat: #40c8ff;
  --bat-g: rgba(64,200,255,.12);
  --mono: 'SF Mono','Cascadia Code','Fira Code','JetBrains Mono','Consolas',monospace;
  --sans: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
}

html, body {
  height: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  overflow-x: hidden;
  overscroll-behavior: none;
}

body {
  padding-top: var(--top);
  padding-bottom: var(--bot);
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Animated grid */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    linear-gradient(rgba(0,240,180,.012) 1px, transparent 1px),
    linear-gradient(90deg, rgba(0,240,180,.012) 1px, transparent 1px);
  background-size: 40px 40px;
  mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
  -webkit-mask-image: radial-gradient(ellipse 80% 60% at 50% 40%, black 20%, transparent 70%);
  pointer-events: none;
  z-index: 0;
  animation: gp 8s ease-in-out infinite alternate;
}
@keyframes gp { 0% { opacity: .5 } 100% { opacity: 1 } }

/* Top glow */
body::after {
  content: '';
  position: fixed;
  top: -120px;
  left: 50%;
  transform: translateX(-50%);
  width: 600px;
  height: 400px;
  background: radial-gradient(ellipse at center,
    rgba(0,240,180,.035) 0%, rgba(0,212,255,.02) 30%, transparent 65%);
  pointer-events: none;
  z-index: 0;
}

/* ─── PAGE — vertically centered like reference ─── */
.page {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 390px;
  min-height: calc(100vh - var(--top) - var(--bot));
  padding: 12px 22px 34px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}

/* ─── HEADER ─── */
.header {
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding-top: 0;
  padding-bottom: 30px;
  gap: 0;
}

.logo-c {
  position: relative;
  width: 54px;
  height: 54px;
  margin-bottom: 15px;
}

.logo-ring {
  position: absolute;
  inset: -3px;
  border-radius: 17px;
  background: conic-gradient(from 0deg, var(--accent), var(--accent2), var(--accent), transparent, var(--accent));
  opacity: .35;
  animation: rr 6s linear infinite;
  filter: blur(1px);
}
@keyframes rr { to { transform: rotate(360deg) } }

.logo-inner {
  position: relative;
  width: 100%;
  height: 100%;
  border-radius: 17px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 25px;
  z-index: 1;
}

.app-name {
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -.5px;
  background: linear-gradient(135deg, var(--text), var(--accent));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  margin-bottom: 5px;
}

.device-line {
  font-family: var(--mono);
  font-size: 11px;
  color: var(--sub);
  letter-spacing: .15px;
  margin-bottom: 16px;
}

.badges {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-bottom: 18px;
}

.badge {
  padding: 4px 12px;
  border-radius: 6px;
  font-family: var(--mono);
  font-size: 9.5px;
  font-weight: 600;
  letter-spacing: .8px;
  text-transform: uppercase;
  border: 1px solid var(--border);
  color: var(--sub);
}

.badge-a {
  background: rgba(0,240,180,.08);
  border-color: rgba(0,240,180,.25);
  color: var(--accent);
  box-shadow: 0 0 12px rgba(0,240,180,.06);
}

.status-row {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  padding: 6px 16px;
  border-radius: 24px;
  background: rgba(0,240,180,.04);
  border: 1px solid rgba(0,240,180,.1);
}

.dot {
  width: 7px;
  height: 7px;
  border-radius: 50%;
  background: var(--accent);
  box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(0,240,180,.3);
  animation: pulse 2.5s ease-in-out infinite;
  flex-shrink: 0;
}
@keyframes pulse {
  0%,100% { opacity: 1; box-shadow: 0 0 8px var(--accent), 0 0 20px rgba(0,240,180,.3); }
  50% { opacity: .4; box-shadow: 0 0 4px var(--accent), 0 0 8px rgba(0,240,180,.15); }
}

.status-label { font-size: 11.5px; color: var(--sub); }
.status-val {
  font-family: var(--mono);
  font-size: 11.5px;
  font-weight: 700;
  color: var(--accent);
  text-transform: uppercase;
  letter-spacing: .5px;
}

/* ─── SECTION LABEL ─── */
.sec {
  width: 100%;
  display: flex;
  align-items: center;
  gap: 10px;
  margin: 0 0 12px;
}
.sec-line {
  flex: 1;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-h), transparent);
}
.sec-label {
  font-family: var(--mono);
  font-size: 9px;
  font-weight: 600;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  color: var(--dim);
  white-space: nowrap;
}

/* ─── PROFILE BUTTONS ─── */
.profiles {
  width: 100%;
  display: flex;
  flex-direction: column;
  gap: 9px;
  margin-bottom: 0;
}

.pbtn {
  position: relative;
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 16px;
  border-radius: 16px;
  border: 1.5px solid var(--border);
  background: var(--card);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  cursor: pointer;
  overflow: hidden;
  transition: all .25s cubic-bezier(.4,0,.2,1);
  user-select: none;
}
.pbtn::before {
  content: '';
  position: absolute;
  inset: 0;
  border-radius: 16px;
  opacity: 0;
  transition: opacity .3s;
}
.pbtn:active { transform: scale(.975); }

.pbtn[data-p="performance"] { --c: var(--perf); --cg: var(--perf-g); }
.pbtn[data-p="balanced"]    { --c: var(--bal);  --cg: var(--bal-g); }
.pbtn[data-p="battery"]     { --c: var(--bat);  --cg: var(--bat-g); }

.pbtn.on {
  border-color: var(--c) !important;
  background: var(--cg) !important;
  box-shadow: 0 0 24px var(--cg), inset 0 0 30px var(--cg);
}
.pbtn.on::before {
  opacity: 1;
  background: linear-gradient(135deg, var(--cg), transparent 60%);
}

.pico {
  width: 44px;
  height: 44px;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 21px;
  flex-shrink: 0;
  background: rgba(0,240,180,.03);
  border: 1px solid rgba(0,240,180,.06);
  transition: all .25s;
  position: relative;
  z-index: 1;
}
.pbtn.on .pico {
  background: rgba(255,255,255,.06);
  border-color: var(--c);
  box-shadow: 0 0 16px var(--cg);
}

.pinfo { flex: 1; min-width: 0; position: relative; z-index: 1; }
.pname {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -.3px;
  color: var(--sub);
  transition: color .25s;
}
.pbtn.on .pname { color: var(--c); }

.pchk {
  width: 22px; height: 22px; border-radius: 50%;
  border: 2px solid rgba(255,255,255,.1);
  display: flex; align-items: center; justify-content: center;
  transition: all .25s; flex-shrink: 0;
  position: relative; z-index: 1;
}
.pbtn.on .pchk {
  border-color: var(--c);
  background: var(--c);
  box-shadow: 0 0 10px var(--cg);
}
.pchk svg { width: 11px; height: 11px; fill: var(--bg); opacity: 0; transition: opacity .2s; }
.pbtn.on .pchk svg { opacity: 1; }

.pload {
  display: none; width: 16px; height: 16px;
  border: 2px solid rgba(255,255,255,.08);
  border-top-color: var(--c);
  border-radius: 50%; animation: spin .5s linear infinite;
  flex-shrink: 0; position: relative; z-index: 1;
}
.pbtn.ld .pload { display: block; }
.pbtn.ld .pchk  { display: none; }
@keyframes spin { to { transform: rotate(360deg) } }

/* ─── TELEGRAM ─── */
.tg-link-wrap {
  width: 100%;
  margin-top: 24px;
  padding-top: 20px;
  border-top: 1px solid rgba(255,255,255,.04);
  text-align: center;
  margin-bottom: 6px;
}

.tg-link {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  border-radius: 10px;
  background: rgba(0,240,180,.04);
  border: 1px solid rgba(0,240,180,.12);
  text-decoration: none;
  transition: all .2s;
  cursor: pointer;
}
.tg-link:active { transform: scale(.97); background: rgba(0,240,180,.08); }

.tg-link-ico { font-size: 15px; }
.tg-link-main {
  font-size: 12px;
  font-weight: 600;
  color: var(--accent);
  letter-spacing: -.1px;
}
.tg-link-sub {
  display: block;
  margin-top: 6px;
  font-family: var(--mono);
  font-size: 9.5px;
  color: var(--dim);
  letter-spacing: .2px;
}

/* ─── FOOTER ─── */
.footer {
  width: 100%;
  text-align: center;
  margin-top: 6px;
  min-height: 8px;
}

/* ─── TOAST ─── */
.toast {
  position: fixed; bottom: calc(30px + var(--bot));
  left: 50%; transform: translateX(-50%) translateY(60px);
  padding: 10px 22px; border-radius: 12px;
  font-family: var(--mono);
  font-size: 12px; font-weight: 600;
  opacity: 0; transition: all .35s cubic-bezier(.34,1.56,.64,1);
  z-index: 100; pointer-events: none;
  backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
  border: 1px solid; white-space: nowrap; letter-spacing: .3px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.t-performance { background: rgba(255,59,59,.1); color: var(--perf); border-color: rgba(255,59,59,.3); box-shadow: 0 0 20px rgba(255,59,59,.1); }
.toast.t-balanced    { background: rgba(255,183,64,.1); color: var(--bal);  border-color: rgba(255,183,64,.3); box-shadow: 0 0 20px rgba(255,183,64,.1); }
.toast.t-battery     { background: rgba(64,200,255,.1); color: var(--bat);  border-color: rgba(64,200,255,.3); box-shadow: 0 0 20px rgba(64,200,255,.1); }
.toast.t-err         { background: rgba(255,60,60,.1);  color: #ff6b6b;    border-color: rgba(255,60,60,.3);  box-shadow: 0 0 20px rgba(255,60,60,.1); }

/* ─── ENTRANCE ANIMATION ─── */
.page > * { animation: fsu .5s cubic-bezier(.4,0,.2,1) both; }
.page > *:nth-child(1) { animation-delay: .05s; }
.page > *:nth-child(2) { animation-delay: .1s; }
.page > *:nth-child(3) { animation-delay: .15s; }
.page > *:nth-child(4) { animation-delay: .2s; }
.page > *:nth-child(5) { animation-delay: .25s; }
@keyframes fsu { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
<div class="page">

  <!-- HEADER -->
  <div class="header">
    <div class="logo-c">
      <div class="logo-ring"></div>
      <div class="logo-inner">🚀</div>
    </div>
    <div class="app-name">AutoSystemBoost</div>
    <div class="device-line" id="deviceLine">OnePlus Device · Qualcomm Snapdragon</div>
    <div class="badges">
      <div class="badge badge-a" id="socBadge">DEVICE</div>
      <div class="badge" id="verBadge">V38</div>
    </div>
    <div class="status-row">
      <div class="dot"></div>
      <span class="status-label">Profile:&nbsp;</span>
      <span class="status-val" id="curProfile">balanced</span>
    </div>
  </div>

  <!-- PROFILES -->
  <div class="sec">
    <div class="sec-line"></div>
    <div class="sec-label">Power Profile</div>
    <div class="sec-line"></div>
  </div>
  <div class="profiles">

    <div class="pbtn" data-p="performance" onclick="go('performance')">
      <div class="pico">🔥</div>
      <div class="pinfo"><div class="pname">Performance</div></div>
      <div class="pload"></div>
      <div class="pchk"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
    </div>

    <div class="pbtn on" data-p="balanced" onclick="go('balanced')">
      <div class="pico">⚖️</div>
      <div class="pinfo"><div class="pname">Balanced</div></div>
      <div class="pload"></div>
      <div class="pchk"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
    </div>

    <div class="pbtn" data-p="battery" onclick="go('battery')">
      <div class="pico">🔋</div>
      <div class="pinfo"><div class="pname">Battery</div></div>
      <div class="pload"></div>
      <div class="pchk"><svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg></div>
    </div>

  </div>

  <!-- TELEGRAM -->
  <div class="tg-link-wrap">
    <a class="tg-link" href="tg://resolve?domain=DKomsomol" onclick="openTelegram(event)">
      <span class="tg-link-ico">✈</span>
      <span class="tg-link-main">@DKomsomol</span>
    </a>
    <div class="tg-link-sub">by Dima_Krylov</div>
  </div>

  <!-- FOOTER -->
  <div class="footer"></div>

</div>
<div class="toast" id="toast"></div>

<script>
const clickAudio = new Audio("switch.mp3"); clickAudio.preload = "auto"; try { clickAudio.load(); } catch(e) {}
const MD = '/data/adb/modules/AutoSystemBoost';

const MODEL_MAP = {
  "CPH2745":"OnePlus 15","OP611FL1":"OnePlus 15","PJZ110":"OnePlus 15","PKZ110":"OnePlus 15",
  "CPH2721":"OnePlus 13","PJE110":"OnePlus 13","CPH2723":"OnePlus 13s",
  "CPH2645":"OnePlus 13R","PJV110":"OnePlus 13R",
  "CPH2581":"OnePlus 12","CPH2613":"OnePlus 12","CPH2573":"OnePlus 12","PJD110":"OnePlus 12",
  "CPH2609":"OnePlus 12R","CPH2611":"OnePlus 12R","CPH2639":"OnePlus 12R",
  "CPH2447":"OnePlus 11","CPH2449":"OnePlus 11","CPH2451":"OnePlus 11","PHB110":"OnePlus 11",
  "CPH2491":"OnePlus Open","CPH2551":"OnePlus Open","CPH2553":"OnePlus Open",
  "CPH2413":"OnePlus Nord 3","CPH2467":"OnePlus Nord CE3",
  "CPH2487":"OnePlus Nord CE4","CPH2675":"OnePlus Nord 4",
  "CPH2529":"OnePlus Ace 3","CPH2599":"OnePlus Ace 3 Pro","CPH2607":"OnePlus Ace 3V",
  "PHK110":"OnePlus Ace 2","PHP110":"OnePlus Ace 2 Pro",
  "CPH2665":"OnePlus Pad 2","CPH2705":"OnePlus Pad"
};
const SOC_MAP = {
  "SM8850":"Snapdragon 8 Elite Gen 5","SM8750":"Snapdragon 8 Elite",
  "SM8650":"Snapdragon 8 Gen 3","SM8635":"Snapdragon 8s Gen 3",
  "SM8550":"Snapdragon 8 Gen 2","SM8475":"Snapdragon 8+ Gen 1",
  "SM8450":"Snapdragon 8 Gen 1","SM7675":"Snapdragon 7+ Gen 3",
  "SM7550":"Snapdragon 7 Gen 3","SM7435":"Snapdragon 7s Gen 3"
};

function prettyModel(code, alias) {
  const c = (code||'').trim().toUpperCase();
  const a = (alias||'').trim().toUpperCase();
  if (MODEL_MAP[c]) return MODEL_MAP[c];
  if (MODEL_MAP[a]) return MODEL_MAP[a];
  const s = (c + ' ' + a).replace(/[_-]/g,' ');
  if (/ONEPLUS\s*15/.test(s))          return 'OnePlus 15';
  if (/ONEPLUS\s*13\s*T|13T/.test(s))  return 'OnePlus 13T';
  if (/ONEPLUS\s*13\s*S|13S/.test(s))  return 'OnePlus 13s';
  if (/ONEPLUS\s*13\s*R|13R/.test(s))  return 'OnePlus 13R';
  if (/ONEPLUS\s*13/.test(s))          return 'OnePlus 13';
  if (/ONEPLUS\s*12\s*R|12R/.test(s))  return 'OnePlus 12R';
  if (/ONEPLUS\s*12/.test(s))          return 'OnePlus 12';
  if (/ACE\s*6\s*PRO/.test(s))         return 'OnePlus Ace 6 Pro';
  if (/ACE\s*6/.test(s))               return 'OnePlus Ace 6';
  if (/ACE\s*5\s*PRO/.test(s))         return 'OnePlus Ace 5 Pro';
  if (/ACE\s*5/.test(s))               return 'OnePlus Ace 5';
  if (/ACE\s*3\s*PRO/.test(s))         return 'OnePlus Ace 3 Pro';
  if (/ACE\s*3/.test(s))               return 'OnePlus Ace 3';
  if (/ACE\s*2\s*PRO/.test(s))         return 'OnePlus Ace 2 Pro';
  if (/ACE\s*2/.test(s))               return 'OnePlus Ace 2';
  if (/OPEN/.test(s))                  return 'OnePlus Open';
  if (/NORD\s*4/.test(s))              return 'OnePlus Nord 4';
  if (/NORD\s*3/.test(s))              return 'OnePlus Nord 3';
  return c || a || 'OnePlus Device';
}

function prettySoc(code) {
  const c = (code||'').trim().toUpperCase();
  return SOC_MAP[c] || c || 'Qualcomm Snapdragon';
}

async function loadDeviceInfo() {
  try {
    const r = await fetch('device_info.json?ts=' + Date.now());
    if (!r.ok) return;
    const d = await r.json();
    const model = prettyModel(d.model_code||'', d.name_code||'');
    const soc   = prettySoc(d.soc_code||'');
    const chip  = (d.soc_code||'').trim().toUpperCase() || 'DEVICE';
    document.getElementById('deviceLine').textContent = model + ' / ' + soc;
    document.getElementById('socBadge').textContent   = chip;
  } catch(e) {}
}

let _id = 0;
function run(cmd) {
  return new Promise(ok => {
    const cb = 'asb_' + (++_id) + '_' + Date.now();
    window[cb] = (e,o,r) => { ok({errno:e, stdout:o||'', stderr:r||''}); delete window[cb]; };
    try {
      if (typeof ksu !== 'undefined') ksu.exec(cmd, '{}', cb);
      else ok({errno:1, stdout:'', stderr:'no ksu'});
    } catch(x) { ok({errno:1, stdout:'', stderr:''+x}); }
  });
}

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.className = 'toast t-' + type;
  t.textContent = msg;
  requestAnimationFrame(() => {
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2200);
  });
}

async function haptic() {
  /* V38 RC: shell-first haptic -- navigator.vibrate() is unreliable in KSU/MMRL
   * WebView; shell fallback via ksu.exec always works on rooted devices. */
  try { await run("cmd vibrator vibrate 18 >/dev/null 2>&1 || service call vibrator 1 i32 18 >/dev/null 2>&1"); } catch(e) {}
  try { if (navigator.vibrate) navigator.vibrate(18); } catch(e) {}
}

function ui(p) {
  document.querySelectorAll('.pbtn').forEach(b => {
    b.classList.toggle('on', b.dataset.p === p);
    b.classList.remove('ld');
  });
  document.getElementById('curProfile').textContent = p;
}

let switching = false;
async function go(p) {
  const btn = document.querySelector('[data-p="' + p + '"]');
  if (switching || btn.classList.contains('on')) return;
  switching = true;
  /* V38 RC fix: spinner only on the clicked button, not all three.
   * Pre-existing bug since at least V6: forEach(add('ld')) caused all
   * profile buttons to briefly show the loading circle during a switch. */
  btn.classList.add('ld');
  const r = await run('sh ' + MD + '/apply_profile.sh ' + p);
  /* Cleanup still uses forEach in case any stale 'ld' class is lingering */
  document.querySelectorAll('.pbtn').forEach(b => b.classList.remove('ld'));
  if (r.errno === 0) {
    haptic();
    try { clickAudio.currentTime = 0; clickAudio.play(); } catch(e) {}
    ui(p);
    toast('\u2713 ' + p.charAt(0).toUpperCase() + p.slice(1) + ' applied', p);
  } else {
    toast('\u2717 Error applying profile', 'err');
  }
  switching = false;
}

function openTelegram(e) {
  if (e && e.preventDefault) e.preventDefault();
