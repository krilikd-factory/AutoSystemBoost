name: ASB · Build Release

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-release:
    runs-on: ubuntu-latest
    name: Release (no debug logs)

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate required source files
        run: |
          for f in \
            src/asb_governor.c \
            src/asb_metrics.h \
            src/asb_fsm.h \
            src/asb_learner.h \
            src/asb_writer.h \
            src/asb_socket.h \
            src/asb_config.h \
            src/asb_fsm_bounds.generated.h \
            src/asb_smart.h \
            src/asb_smart_defs.h \
            src/build_ndk_release.sh \
            src/DSP/asb_dsp.c \
            src/DSP/asb_effect_abi.h \
            module.prop \
            customize.sh \
            service.sh; do
            if [ ! -f "$f" ]; then
              echo "ERROR: required file missing: $f"
              exit 1
            fi
            echo "  v $f"
          done

      - name: Validate profile bounds source-of-truth
        run: |
          cp config/profile_bounds.generated.sh /tmp/_bounds_sh.before 2>/dev/null || true
          cp src/asb_fsm_bounds.generated.h    /tmp/_bounds_h.before  2>/dev/null || true
          bash tools/gen_bounds.sh
          if ! diff -q /tmp/_bounds_sh.before config/profile_bounds.generated.sh >/dev/null 2>&1 \
            || ! diff -q /tmp/_bounds_h.before src/asb_fsm_bounds.generated.h >/dev/null 2>&1; then
            echo "ERROR: generated bounds files are STALE"
            echo "       Run 'bash tools/gen_bounds.sh' locally and commit."
            exit 1
          fi
          echo "Generated bounds artefacts up-to-date."

      - name: Run asb_lint.sh
        run: |
          if [ ! -f tools/asb_lint.sh ]; then
            echo "WARNING: tools/asb_lint.sh missing — skipping"
            exit 0
          fi
          MODDIR="$(pwd)" bash tools/asb_lint.sh

      - name: Run unit tests (smart learner)
        run: |
          # 332 host-side unit tests covering the smart learner: weights, decay,
          # confidence, blend math, night override, thermal veto, bucket learning,
          # slot gating and the persistence round-trip. They were sitting in the repo
          # green but unwired, so nothing actually guarded that math on a release.
          # They need no NDK and no device - plain gcc against src/.
          _rc=0
          for _t in tests/test_smart_session2.sh tests/test_smart_session3.sh; do
            [ -f "$_t" ] || { echo "WARNING: $_t missing - skipping"; continue; }
            echo "== $_t =="
            bash "$_t" || _rc=1
          done
          if [ "$_rc" != "0" ]; then
            echo "::error::smart learner unit tests FAILED - refusing to build a release"
            exit 1
          fi

      - name: Install tools
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends zip unzip curl file rsync

      - name: Cache Android NDK
        id: cache-ndk
        uses: actions/cache@v4
        with:
          path: android-ndk-r28c
          key: android-ndk-r28c

      - name: Download Android NDK
        if: steps.cache-ndk.outputs.cache-hit != 'true'
        run: |
          curl -L --retry 3 --retry-delay 5 \
            -o android-ndk.zip \
            https://dl.google.com/android/repository/android-ndk-r28c-linux.zip
          unzip -q android-ndk.zip
          rm -f android-ndk.zip

      - name: Set NDK environment
        run: |
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r28c" >> $GITHUB_ENV
          echo "NDK_ROOT=$PWD/android-ndk-r28c"         >> $GITHUB_ENV

      - name: Patch module.prop
        run: |
          TAG="${GITHUB_REF_NAME:-}"
          if echo "$TAG" | grep -qE '^v[0-9]'; then
            sed -i "s/^version=.*/version=${TAG}/" module.prop
          fi
          cat module.prop

      - name: Normalize DSP source path for Linux CI
        run: |
          if [ -d src/DSP ] && [ ! -e src/dsp ]; then
            ln -s DSP src/dsp
          fi
          test -f src/dsp/asb_dsp.c || { echo "ERROR: src/dsp/asb_dsp.c not found after normalization"; exit 1; }
          test -f src/dsp/asb_effect_abi.h || { echo "ERROR: src/dsp/asb_effect_abi.h not found after normalization"; exit 1; }
          ls -la src/dsp

      - name: Build RELEASE binary (no debug logs)
        # The AIDL effect prebuilt (src/DSP_AIDL/prebuilt/<abi>/libasbdsp_aidl.so) is used
        # automatically when present - build_ndk_release.sh detects the file and prefers it
        # over the legacy .so, verifying the createEffect symbol. We do NOT force
        # ASB_DSP_AIDL=1 here so the release is not blocked before the prebuilt exists; the
        # verify step below reports which effect variant actually shipped.
        run: ASB_BUILD_MODE=release bash src/build_ndk_release.sh

      - name: Verify release binary and DSP library
        run: |
          B="bin/arm64-v8a/asb"
          SO="bin/arm64-v8a/libasbdsp.so"

          test -f "$B" || { echo "ERROR: $B not found"; exit 1; }
          test -x "$B" || { echo "ERROR: $B not executable"; exit 1; }
          FILE_OUT="$(file "$B")"
          echo "$B file: $FILE_OUT"
          echo "$FILE_OUT" | grep -q "aarch64"          || { echo "ERROR: not aarch64!"; exit 1; }
          echo "$FILE_OUT" | grep -q "ELF"              || { echo "ERROR: not ELF!"; exit 1; }
          echo "$FILE_OUT" | grep -q "Android\|dynamic" || { echo "ERROR: not Android binary!"; exit 1; }
          SIZE=$(wc -c < "$B")
          echo "Binary size: $SIZE bytes"
          [ "$SIZE" -gt 10000 ]   || { echo "ERROR: too small"; exit 1; }
          [ "$SIZE" -lt 2000000 ] || { echo "ERROR: too large"; exit 1; }

          test -f "$SO" || { echo "ERROR: $SO not found"; exit 1; }
          SO32="bin/armeabi-v7a/libasbdsp.so"
          if [ -f "$SO32" ]; then
            F32="$(file "$SO32")"; echo "$SO32 file: $F32"
            echo "$F32" | grep -q "ARM"  || { echo "ERROR: $SO32 is not 32-bit ARM!"; exit 1; }
            echo "$F32" | grep -q "ELF"  || { echo "ERROR: $SO32 not ELF!"; exit 1; }
          else
            echo "::error::$SO32 missing - the armeabi-v7a build did not run"
            exit 1
          fi
          FILE_SO="$(file "$SO")"
          echo "$SO file: $FILE_SO"
          echo "$FILE_SO" | grep -q "aarch64" || { echo "ERROR: DSP .so is not aarch64!"; exit 1; }
          echo "$FILE_SO" | grep -q "ELF"     || { echo "ERROR: DSP .so is not ELF!"; exit 1; }
          echo "$FILE_SO" | grep -q "shared object" || { echo "ERROR: DSP artifact is not a shared object!"; exit 1; }
          SO_SIZE=$(wc -c < "$SO")
          echo "DSP size: $SO_SIZE bytes"
          [ "$SO_SIZE" -gt 1000 ] || { echo "ERROR: DSP .so too small"; exit 1; }

          # Report which effect ABI actually shipped. On Android 13+/16 audioserver loads
          # effects through the AIDL factory (createEffect); a legacy AELI-only .so is
          # never bound to the stream, so surface a clear warning if that is what shipped.
          if command -v llvm-nm >/dev/null 2>&1; then NM=llvm-nm; else NM="$(ls "$ANDROID_NDK_HOME"/toolchains/llvm/prebuilt/*/bin/llvm-nm 2>/dev/null | head -1)"; fi
          [ -n "$NM" ] && [ -x "$NM" ] || NM=nm
          for so in "$SO" "$SO32"; do
            [ -f "$so" ] || continue
            SYMS="$("$NM" -D --defined-only "$so" 2>/dev/null || true)"
            if echo "$SYMS" | grep -q " createEffect$"; then
              echo "::notice::$so is the AIDL effect (createEffect present) - loads on Android 13+/16"
            elif echo "$SYMS" | grep -q "AUDIO_EFFECT_LIBRARY_INFO_SYM"; then
              echo "::warning::$so is the LEGACY effect (AELI only). Android 13+/16 will NOT bind it to the music stream. Build src/DSP_AIDL via the 'Build DSP AIDL' workflow and commit the prebuilt so the AIDL variant ships."
            else
              echo "::warning::$so exports neither createEffect nor AELI - effect will not load"
            fi
          done

      - name: Package RELEASE zip
        run: |
          PKG_REL="$PWD/.pkg-release"
          rm -rf "$PKG_REL"
          mkdir -p "$PKG_REL"

          rsync -a ./ "$PKG_REL"/ \
            --exclude '.git'                          \
            --exclude '.github'                       \
            --exclude 'android-ndk*'                  \
            --exclude '.pkg-*'                        \
            --exclude '*.zip'                         \
            --exclude '__MACOSX'                      \
            --exclude '*.DS_Store'                    \
            --exclude '__pycache__'                   \
            --exclude '*.pyc'                         \
            --exclude 'src'                           \
            --exclude 'bin/arm64-v8a'                 \
            --exclude 'bin/armeabi-v7a'               \
            --exclude 'banner.png'                    \
            --exclude 'banner2.png'                   \
            --exclude 'CHANGELOG.md'                  \
            --exclude 'README.md'                     \
            --exclude 'README.ru.md'                  \
            --exclude 'update.json'                   \
            --exclude 'RELEASE_CHECKLIST.md'          \
            --exclude 'docs'                          \
            --exclude 'tests'                         \
            --exclude 'tools'                         \
            --exclude 'config/profile_bounds.conf'    \
            --exclude 'config/governor.conf'

          mkdir -p "$PKG_REL/bin"
          install -m 0755 bin/arm64-v8a/asb "$PKG_REL/bin/asb"
          # Both ABIs: /vendor/lib64/soundfx and /vendor/lib/soundfx both exist on the
          # target and each needs a library of its own bitness.
          install -m 0644 bin/arm64-v8a/libasbdsp.so "$PKG_REL/bin/libasbdsp.so"
          if [ -f bin/armeabi-v7a/libasbdsp.so ]; then
            install -m 0644 bin/armeabi-v7a/libasbdsp.so "$PKG_REL/bin/libasbdsp_32.so"
            echo "DSP: both ABIs packaged"
          else
            # Loud, because the only symptom on-device is /vendor/lib/soundfx quietly
            # never appearing - which is exactly how this shipped broken once already.
            echo "::error::armeabi-v7a libasbdsp.so was NOT built - check the DSP build step above"
            exit 1
          fi
          find "$PKG_REL" -name "*.log" -delete

          # V48: ship the Smart Mode user-facing CLI tool (rest of tools/ is dev-only)
          if [ -f "tools/asb_smart_mode.sh" ]; then
            mkdir -p "$PKG_REL/tools"
            install -m 0755 tools/asb_smart_mode.sh "$PKG_REL/tools/asb_smart_mode.sh"
          fi

          # Device-adaptive layer (must ship so install/boot can run them):
          #   asb_discover.sh        — writes device_caps.env (facts)
          #   asb_synthesize_bounds.sh — writes device_bounds.env (OP15-ratio bounds)
          #   asb_install_probe.sh   — install-time stock-file inventory/analysis
          for _t in asb_discover.sh asb_synthesize_bounds.sh asb_install_probe.sh; do
            if [ -f "tools/$_t" ]; then
              mkdir -p "$PKG_REL/tools"
              install -m 0755 "tools/$_t" "$PKG_REL/tools/$_t"
            fi
          done

          ASB_VER=$(grep '^version=' module.prop | cut -d= -f2)
          ZIP_REL="ASB-${ASB_VER}.zip"
          rm -f "$ZIP_REL"
          ( cd "$PKG_REL" && zip -rq "../$ZIP_REL" . -x "*.DS_Store" )
          echo "ZIP_REL=$ZIP_REL"   >> $GITHUB_ENV
          echo "ASB_VER=$ASB_VER"   >> $GITHUB_ENV
          echo "Created: $ZIP_REL ($(du -sh $ZIP_REL | cut -f1))"

      - name: Validate RELEASE zip
        run: |
          echo "=== Zip contents ==="
          unzip -l "$ZIP_REL"

          for required in \
            "bin/asb" \
            "bin/libasbdsp.so" \
            "bin/libasbdsp_32.so" \
            "service.sh" \
            "module.prop" \
            "post-fs-data.sh" \
            "apply_profile.sh" \
            "action.sh" \
            "uninstall.sh" \
            "customize.sh" \
            "features.conf" \
            "runtime/asb_watchdog.sh" \
            "runtime/asb_reconcile.sh" \
            "runtime/profile_core.sh" \
            "runtime/asb_baseline.sh" \
            "runtime/asb_utils.sh" \
            "profiles/battery.sh" \
            "profiles/balanced.sh" \
            "profiles/performance.sh" \
            "config/profile_bounds.generated.sh" \
            "config/governor.conf.shipped" \
            "tools/asb_smart_mode.sh" \
            "tools/asb_discover.sh" \
            "tools/asb_synthesize_bounds.sh" \
            "webroot/index.html"; do
            unzip -l "$ZIP_REL" | grep -q "$required" \
              || { echo "ERROR: $ZIP_REL missing $required"; exit 1; }
          done

          for forbidden in \
            "tools/asb_lint.sh" \
            "tools/gen_bounds.sh" \
            "tools/asb_vendor_thermal_probe.sh" \
            "tools/asb_field_report.py" \
            "tools/logkit/" \
            "docs/" \
            "tests/" \
            "bin/arm64-v8a" \
            "android-ndk" \
            "src/asb_governor.c" \
            "config/profile_bounds.conf" \
            "config/governor.conf$"; do
            if unzip -l "$ZIP_REL" | grep -qE "$forbidden"; then
              echo "ERROR: $ZIP_REL leaked $forbidden (debug/dev artifact)"
              exit 1
            fi
          done
          echo "RELEASE zip validation passed"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASB-${{ env.ASB_VER }}
          path: ${{ env.ZIP_REL }}
          retention-days: 30

      - name: Attach to GitHub release
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ZIP_REL }}

      - name: Build summary
        if: always()
        run: |
          echo ""
          echo "========================================"
          echo "  ASB Release Build Summary"
          echo "========================================"
          echo "  Trigger : ${{ github.event_name }}"
          echo "  Ref     : ${GITHUB_REF_NAME:-unknown}"
          echo "  Version : ${ASB_VER:-unknown}"
          if [ -f "${ZIP_REL:-}" ]; then
            echo "  ZIP     : $ZIP_REL ($(du -sh $ZIP_REL | cut -f1))"
            BINSZ=$(unzip -p "$ZIP_REL" bin/asb 2>/dev/null | wc -c)
            SOSZ=$(unzip -p "$ZIP_REL" bin/libasbdsp.so 2>/dev/null | wc -c)
            echo "  Binary  : ${BINSZ} bytes (no debug logs)"
            echo "  DSP .so : ${SOSZ} bytes"
          fi
          echo "========================================"
