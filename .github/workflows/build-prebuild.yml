name: Build ASB prebuilt binaries

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  build-arm64:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install zip tools
        run: sudo apt-get update && sudo apt-get install -y zip unzip curl file

      - name: Download Android NDK
        run: |
          curl -L -o android-ndk.zip https://dl.google.com/android/repository/android-ndk-r27c-linux.zip
          unzip -q android-ndk.zip
          echo "ANDROID_NDK_ROOT=$PWD/android-ndk-r27c" >> $GITHUB_ENV
          echo "NDK_ROOT=$PWD/android-ndk-r27c" >> $GITHUB_ENV

      - name: Build arm64-v8a prebuilt
        run: bash src/build_ndk_release.sh

      - name: Verify binary
        run: |
          test -x bin/arm64-v8a/asb_governor
          file bin/arm64-v8a/asb_governor || true

      - name: Create release zip
        run: |
          rm -f ASB-V22-AI-prebuilt.zip
          zip -r ASB-V22-AI-prebuilt.zip . \
            -x '.git/*' '.github/*' 'android-ndk.zip' 'android-ndk-r27c/*' \
               '*.DS_Store' '__MACOSX/*'

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ASB-V22-AI-prebuilt
          path: |
            bin/arm64-v8a/asb_governor
            ASB-V22-AI-prebuilt.zip

      - name: Upload release asset
        if: github.event_name == 'release'
        uses: softprops/action-gh-release@v2
        with:
          files: ASB-V22-AI-prebuilt.zip
