# AutoSystemBoost — feature toggles
#
# Active features: applied at runtime by service.sh / post-fs-data.sh,
# gated via `asb_feature_enabled <NAME>`.
#
# RESERVED features: declared so the installer remembers user choices
# across upgrades, but have no current runtime code path. Will be wired
# in future releases. Lint warns but does not error on RESERVED entries.
AUDIO=1
BT=1
NFC=1
CAMERA=1
MEDIA=1
CPU=1
VM=1
NET=1
WIFI=1
GPS=1
KERNEL=1
LOG=1
RADIO_IMS=1     # RESERVED
DISPLAY=1       # RESERVED
FPS=1           # RESERVED
SECURITY=1      # RESERVED
BG_TRIM=0
VENDOR_OVERLAY=1
SOTER_REPAIR=0
